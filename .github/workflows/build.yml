name: "Build Game"

on:
  workflow_call:
    secrets:
      ITCH_GAME_NAME:
        required: true
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.3"
  GODOT_EXPORT_VERSION: "4.6.3-stable"
  ITCH_GAME_NAME: ${{ secrets.ITCH_GAME_NAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    name: "🏗️ Build Game"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Wine
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends wine64

      - name: Export Game
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_EXPORT_VERSION }}/Godot_v${{ env.GODOT_EXPORT_VERSION }}_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_EXPORT_VERSION }}/Godot_v${{ env.GODOT_EXPORT_VERSION }}_export_templates.tpz
          relative_project_path: ./
          cache: true
          export_debug: false
          archive_output: false
          wine_path: /usr/bin/wine64

      - name: Copy settings.cfg to Build Directories
        run: |
          for dir in $(find ${{ steps.export.outputs.build_directory }} -mindepth 1 -maxdepth 1 -type d); do
            cp ./settings.cfg "$dir/"
            echo "📄 Copied settings.cfg to $dir"
          done

      - name: Archive Builds
        run: |
          mkdir -p ./archives
          for dir in $(find ${{ steps.export.outputs.build_directory }} -mindepth 1 -maxdepth 1 -type d); do
            DIRNAME=$(basename "$dir")
            (cd "$dir" && zip -r "../../archives/${DIRNAME}.zip" .)
            echo "📦 Archived $DIRNAME"
          done

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ITCH_GAME_NAME }}-Artifacts
          path: ./archives/*
          retention-days: 30

