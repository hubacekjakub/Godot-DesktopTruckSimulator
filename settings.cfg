[TruckSettings]
; Speed range in pixels/second — a random value is picked each pass
min_speed = 100.0
max_speed = 300.0

; Pause duration between passes, in seconds
min_wait_time = 5.0
max_wait_time = 15.0

; Vertical position from the bottom of the screen (negative = higher up)
vertical_offset = -192

; Enable garage customization (color + cabin picker)
customization = true

; Drive across all monitors instead of just the primary one
multimonitor = true

; Scale multiplier applied to the truck sprite
truck_scale = 1.2

[ShaderSettings]
; Width in pixels of the fade-out zone at each screen edge
fade_margin = 100.0
